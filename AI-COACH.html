<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KALOS · AI COACH</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00ffd5;--blue:#00a8ff;--violet:#8b3dff;
  --gold:#ffc14d;--success:#00ffaa;--danger:#ff3355;
  --bg:#010206;--border:rgba(0,168,255,.18);--muted:#4a5a7a;
}
html,body{height:100%;background:var(--bg);color:#eaf6ff;font-family:'Share Tech Mono',monospace;overflow:hidden}
body{display:flex;flex-direction:column}

header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;
  background:rgba(2,4,12,.97);border-bottom:1px solid rgba(139,61,255,.4);z-index:10}
.logo{font-family:'Cinzel',serif;font-size:18px;font-weight:900;letter-spacing:.18em;
  text-shadow:0 0 16px var(--violet);display:flex;align-items:center;gap:8px}
.back-btn{background:rgba(255,51,85,.1);border:1px solid rgba(255,51,85,.4);color:#ff8099;
  font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer}

.main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;min-height:0}

/* ── VIDEO AREA ── */
.cam-wrap{position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* The video and canvas sit inside a sized box that preserves AR */
#mediaBox{position:relative;max-width:100%;max-height:100%}
#inputVideo,#videoFile{display:block;max-width:100%;max-height:100%;object-fit:contain}
#outputCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* HUD corners */
.hud-corner{position:absolute;width:28px;height:28px;border-color:var(--cyan);border-style:solid;opacity:.65;z-index:5;pointer-events:none}
.hud-corner.tl{top:0;left:0;border-width:2px 0 0 2px}
.hud-corner.tr{top:0;right:0;border-width:2px 2px 0 0}
.hud-corner.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.hud-corner.br{bottom:0;right:0;border-width:0 2px 2px 0}

/* Status bar */
.status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);border:1px solid rgba(0,255,213,.35);border-radius:20px;
  padding:4px 14px;font-size:11px;color:var(--cyan);letter-spacing:.07em;white-space:nowrap;z-index:5;pointer-events:none}

/* Overlays */
.rep-overlay{position:absolute;bottom:14px;right:14px;background:rgba(0,0,0,.8);
  border:2px solid var(--cyan);border-radius:10px;padding:10px 16px;text-align:center;z-index:5}
.rep-num{font-family:'Orbitron',monospace;font-size:46px;font-weight:900;color:var(--cyan);line-height:1}
.rep-label{font-size:9px;color:var(--muted);letter-spacing:.12em;margin-top:2px}
.form-overlay{position:absolute;bottom:14px;left:14px;background:rgba(0,0,0,.8);
  border:2px solid var(--violet);border-radius:10px;padding:8px 12px;text-align:center;z-index:5;min-width:70px}
.form-score-val{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:var(--violet);line-height:1}
.form-label{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-top:2px}

/* Placeholder */
.cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;background:linear-gradient(160deg,#010206,#0a0620);z-index:3}
.cam-placeholder p{font-size:12px;color:var(--muted);text-align:center;line-height:2}
.drop-zone-hint{font-size:32px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.placeholder-btn{background:rgba(0,255,213,.1);border:1px solid rgba(0,255,213,.4);color:var(--cyan);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 20px;border-radius:6px;cursor:pointer;letter-spacing:.07em}
.placeholder-btn.sec{background:rgba(139,61,255,.1);border-color:rgba(139,61,255,.4);color:#c8a4ff;margin-top:2px}

/* Drag overlay */
.drag-flash{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:rgba(0,255,213,.07);border:3px dashed var(--cyan)}
.drag-flash.on{display:flex}
.drag-flash-txt{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:.2em;color:var(--cyan)}

/* ── PANEL ── */
.panel{display:flex;flex-direction:column;background:rgba(4,8,26,.98);
  border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin}
.panel-sec{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.panel-title{font-size:9px;letter-spacing:.2em;color:var(--muted);margin-bottom:10px}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cat-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;
  padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Share Tech Mono',monospace}
.cat-btn:hover{border-color:rgba(0,255,213,.4);background:rgba(0,255,213,.05)}
.cat-btn.active{border-color:var(--cyan);background:rgba(0,255,213,.1);color:var(--cyan)}
.cat-btn .ci{font-size:18px;display:block;margin-bottom:3px}
.cat-btn .cn{font-size:8px;color:var(--muted);line-height:1.3}
.cat-btn.active .cn{color:var(--cyan)}

/* Variant list */
#variantList{display:flex;flex-direction:column;gap:5px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.var-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;
  padding:9px 12px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;
  color:#eaf6ff;text-align:right;transition:all .15s;display:flex;align-items:center;gap:8px}
.var-btn:hover{border-color:rgba(139,61,255,.6);background:rgba(139,61,255,.12);color:#fff}
.var-btn.active{border-color:var(--violet);background:rgba(139,61,255,.22);color:#fff}
.var-btn .vi{font-size:14px;flex-shrink:0}
.var-btn .vn{flex:1;line-height:1.4;color:#eaf6ff}
.var-btn .vd{font-size:9px;color:#8aa0c0;margin-top:2px}

/* Metrics */
.metric{display:flex;justify-content:space-between;align-items:center;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.metric-label{color:var(--muted)}
.metric-val{font-weight:700;font-family:'Orbitron',monospace;font-size:12px}

/* Feedback */
.fb-item{padding:7px 10px;border-radius:5px;font-size:11px;line-height:1.5;
  border-right:3px solid;animation:fbIn .25s ease;margin-bottom:5px}
.fb-item.good{background:rgba(0,255,170,.07);border-color:var(--success);color:var(--success)}
.fb-item.warn{background:rgba(255,193,77,.07);border-color:var(--gold);color:var(--gold)}
.fb-item.bad{background:rgba(255,51,85,.07);border-color:var(--danger);color:#ff8099}
.fb-item.info{background:rgba(0,168,255,.07);border-color:var(--blue);color:#7dd3fc}
@keyframes fbIn{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}

/* Controls */
.ctrl-row{display:flex;gap:7px;padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;flex-shrink:0}
.btn-main{flex:1;border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,255,213,.1);
  font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;padding:11px;
  border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:all .2s}
.btn-main.stop{border-color:var(--danger);color:#ff8099;background:rgba(255,51,85,.1)}
.btn-verdict{border:1px solid rgba(255,215,0,.45);color:#ffd700;background:rgba(255,215,0,.08);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:11px 14px;border-radius:6px;cursor:pointer}
.btn-verdict:disabled{opacity:.3;cursor:default}

/* Verdict modal */
#verdictModal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);
  align-items:center;justify-content:center}
#verdictModal.show{display:flex}
.verdict-card{background:linear-gradient(160deg,#0a0620,#04081a);
  border-radius:16px;padding:36px 28px;max-width:360px;width:92%;text-align:center;direction:rtl}
.verdict-big{font-size:80px;line-height:1;margin-bottom:14px}
.verdict-title{font-family:'Cinzel',serif;font-size:22px;letter-spacing:.15em;margin-bottom:8px}
.verdict-stats{background:rgba(255,255,255,.04);border-radius:8px;padding:14px;margin:16px 0;font-size:12px;line-height:2.1;text-align:right}
.verdict-row{display:flex;justify-content:space-between;align-items:center}
.verdict-row .vk{color:var(--muted)}
.verdict-row .vv{font-family:'Orbitron',monospace;font-size:13px;font-weight:700}
.verdict-btns{display:flex;gap:8px;margin-top:4px}

/* Loading */
#loadingOv{position:fixed;inset:0;z-index:500;background:rgba(1,2,6,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loading-ring{width:56px;height:56px;border:3px solid rgba(0,255,213,.12);
  border-top:3px solid var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="25" viewBox="0 0 64 72">
      <polygon points="32,4 60,20 60,52 32,68 4,52 4,20" fill="none" stroke="var(--cyan)" stroke-width="3"/>
      <g stroke="var(--cyan)" stroke-width="6" stroke-linecap="round" fill="none">
        <line x1="25" y1="22" x2="25" y2="50"/><line x1="25" y1="36" x2="43" y2="22"/><line x1="25" y1="36" x2="43" y2="50"/>
      </g>
    </svg>
    KALOS · AI COACH
  </div>
  <button class="back-btn" onclick="history.back()">‹ חזרה</button>
</header>

<div class="main">

  <!-- VIDEO AREA -->
  <div class="cam-wrap" id="camWrap">

    <!-- Drag flash -->
    <div class="drag-flash" id="dragFlash">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
      </svg>
      <div class="drag-flash-txt">שחרר לניתוח</div>
    </div>

    <!-- Media box — sized to match video AR -->
    <div id="mediaBox">
      <video id="inputVideo" playsinline muted style="display:none"></video>
      <video id="videoFile" playsinline loop style="display:none"></video>
      <canvas id="outputCanvas"></canvas>
      <!-- HUD corners inside box -->
      <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div><div class="hud-corner br"></div>
    </div>

    <div class="status-bar" id="statusBar">בחר תרגיל</div>

    <div class="rep-overlay" id="repOverlay" style="display:none">
      <div class="rep-num" id="repCount">0</div>
      <div class="rep-label" id="repLabel">חזרות</div>
    </div>

    <div class="form-overlay" id="formOverlay" style="display:none">
      <div class="form-score-val" id="formScore">—</div>
      <div class="form-label">FORM</div>
    </div>

    <!-- Placeholder -->
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="drop-zone-hint">🎬</div>
      <p>גרור סרטון לכאן<br>או בחר קובץ / מצלמה</p>
      <button class="placeholder-btn" onclick="document.getElementById('fileInput').click()">📂 בחר קובץ וידאו</button>
      <button class="placeholder-btn sec" onclick="startLive()">📷 מצלמה חיה</button>
      <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="handleFileSelect(this.files[0])">
    </div>

  </div>

  <!-- PANEL -->
  <div class="panel">

    <!-- Step 1: Category -->
    <div class="panel-sec">
      <div class="panel-title">① בחר קטגוריה</div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- Step 2: Variant -->
    <div id="variantSec" style="display:none">
      <div style="padding:10px 14px 4px;font-size:9px;letter-spacing:.2em;color:var(--muted)">② בחר תרגיל ספציפי</div>
      <div id="variantList"></div>
    </div>

    <!-- Camera angle guide -->
    <div id="angleGuide" style="display:none;margin:0 14px 12px;padding:10px 12px;
      background:rgba(139,61,255,.06);border:1px solid rgba(139,61,255,.25);border-radius:7px;
      font-size:11px;line-height:1.7;color:#c8a4ff">
      <b style="color:var(--cyan)">📐 זווית:</b> <span id="angleText"></span>
    </div>

    <!-- Metrics -->
    <div class="panel-sec">
      <div class="panel-title">מדדים</div>
      <div class="metric"><span class="metric-label">זווית מרפק</span><span class="metric-val" id="mElbow" style="color:var(--cyan)">—°</span></div>
      <div class="metric"><span class="metric-label">זווית ירך</span><span class="metric-val" id="mHip" style="color:var(--gold)">—°</span></div>
      <div class="metric"><span class="metric-label">יישור גוף</span><span class="metric-val" id="mBody">—</span></div>
      <div class="metric"><span class="metric-label">שלב תנועה</span><span class="metric-val" id="mPhase" style="color:var(--success)">—</span></div>
      <div class="metric"><span class="metric-label">ביטחון זיהוי</span><span class="metric-val" id="mConf">—%</span></div>
    </div>

    <!-- Feedback -->
    <div style="padding:8px 14px 4px;font-size:9px;letter-spacing:.2em;color:var(--muted)">משוב AI</div>
    <div style="padding:0 14px 8px;flex:1;overflow-y:auto" id="feedbackList">
      <div class="fb-item info">בחר קטגוריה ותרגיל להתחלה.</div>
    </div>

    <!-- Controls -->
    <div class="ctrl-row">
      <button class="btn-main" id="startBtn" onclick="toggleSource()">▶ התחל</button>
      <button class="btn-verdict" id="verdictBtn" onclick="showVerdict()" disabled>🏅 תוצאה</button>
    </div>

  </div>
</div>

<!-- Loading -->
<div id="loadingOv">
  <div class="loading-ring"></div>
  <div style="font-family:'Orbitron',monospace;font-size:12px;letter-spacing:.2em;color:var(--cyan)">AI COACH</div>
  <div style="font-size:11px;color:var(--muted)" id="loadingMsg">טוען מודל...</div>
</div>

<!-- Verdict modal -->
<div id="verdictModal">
  <div class="verdict-card" id="verdictCard"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
/* ================================================================
   EXERCISE DEFINITIONS — categories + variants
   ================================================================ */
const CATS={
  pullup:{name:'מתח',icon:'🦅',
    variants:{
      pu_basic:{name:'מתח רגיל',desc:'אחיזה על-יד',minReps:1,
        angle:'פרופיל (צד) — הגוף ימין/שמאל למצלמה',
        criteria:{reps:1,form:60},
        analyze(lm,c){return analyzePullup(lm,c,'overhand');}},
      pu_wide:{name:'מתח רחב',desc:'אחיזה רחבה מעל כתפיים',minReps:1,
        angle:'פרופיל (צד)',
        criteria:{reps:1,form:60},
        analyze(lm,c){return analyzePullup(lm,c,'wide');}},
      pu_archer:{name:'מתח קשת',desc:'יד אחת ישרה, יד אחת מושכת',minReps:1,
        angle:'פרופיל (צד)',
        criteria:{reps:1,form:55},
        analyze(lm,c){return analyzePullup(lm,c,'archer');}},
      pu_oa:{name:'מתח חד-יד',desc:'OA Pull-up',minReps:1,
        angle:'פרופיל (צד)',
        criteria:{reps:1,form:50},
        analyze(lm,c){return analyzePullup(lm,c,'oa');}},
    }
  },
  pushup:{name:'שכיבות',icon:'💪',
    variants:{
      pu_normal:{name:'שכיבות רגילות',desc:'ידיים רוחב כתפיים',minReps:5,
        angle:'פרופיל (צד) — גוף שטוח',
        criteria:{reps:5,form:65},
        analyze:analyzePushup},
      pu_diamond:{name:'שכיבות יהלום',desc:'אצבעות נוגעות — Triangle',minReps:5,
        angle:'פרופיל (צד)',
        criteria:{reps:5,form:65},
        analyze:analyzePushup},
      pu_pike:{name:'שכיבות פייק',desc:'ירכיים למעלה — V shape',minReps:5,
        angle:'פרופיל (צד)',
        criteria:{reps:5,form:60},
        analyze:analyzePikePushup},
      pu_pseudo:{name:'Pseudo Planche Push-up',desc:'ידיים לאחור, גוף קדימה',minReps:3,
        angle:'פרופיל (צד)',
        criteria:{reps:3,form:55},
        analyze:analyzePushup},
      pu_wall_hspu:{name:'HSPU לקיר',desc:'שכיבה בעמידת ידיים לקיר',minReps:1,
        angle:'פרופיל (צד) — הקיר בצד',
        criteria:{reps:1,form:55},
        analyze:analyzeHSPU},
      pu_free_hspu:{name:'HSPU חופשי',desc:'שכיבה בעמידת ידיים',minReps:1,
        angle:'פרופיל (צד)',
        criteria:{reps:1,form:60},
        analyze:analyzeHSPU},
    }
  },
  dip:{name:'מקבילים',icon:'🔻',
    variants:{
      dip_std:{name:'מקבילים רגיל',desc:'גוף אנכי',minReps:5,
        angle:'פרופיל (צד)',
        criteria:{reps:5,form:65},
        analyze:analyzeDip},
      dip_lean:{name:'מקבילים הטיה',desc:'הטיה קדימה לחזה',minReps:5,
        angle:'פרופיל (צד)',
        criteria:{reps:5,form:60},
        analyze:analyzeDip},
    }
  },
  handstand:{name:'עמידת ידיים',icon:'🤸',
    variants:{
      hs_wall:{name:'עמידת ידיים לקיר',desc:'חזה לקיר / גב לקיר',holdSec:10,
        angle:'פרופיל (צד) — הקיר נראה, כל הגוף בפריים',
        criteria:{hold:10,form:55},
        analyze:analyzeHandstand},
      hs_free:{name:'עמידת ידיים חופשית',desc:'ללא תמיכה',holdSec:5,
        angle:'פרופיל (צד) — כל הגוף בפריים',
        criteria:{hold:5,form:60},

      hs_shape:{name:'Handstand Shape',desc:'בדיקת יישור — קו ישר מכף רגל לכף יד',holdSec:5,

  skill:{name:'כוח / סקיל',icon:'⚡',
    variants:{
      lsit:{name:'L-Sit',desc:'רגליים מקביל לרצפה',holdSec:5,
        angle:'פרופיל (צד)',
        criteria:{hold:5,form:65},
        analyze:analyzeLSit},
      planche_lean:{name:'Planche Lean',desc:'הישענות פלאנץ׳',holdSec:10,

      fl_tuck:{name:'Front Lever Tuck',desc:'תנוחת מינוף קדמי מגולגל',holdSec:5,

      squat:{name:'סקוואט',desc:'מתחת למקבילה',minReps:10,

        criteria:{reps:10,form:65},
        analyze:analyzeSquat},
      pistol_neg:{name:'פיסטול שלילי',desc:'ירידה על רגל אחת',minReps:3,
        angle:'פרופיל (צד)',
        criteria:{reps:3,form:55},
        analyze:analyzeSquat},
      pistol:{name:'פיסטול',desc:'Pistol Squat מלא',minReps:1,
        angle:'פרופיל (צד)',
        criteria:{reps:1,form:60},
        analyze:analyzeSquat},
    }
  },

/* ================================================================
   ANGLE HELPER
   ================================================================ */
function ang(a,b,c){
  if(!a||!b||!c)return 0;
  const ax=a.x-b.x,ay=a.y-b.y,cx=c.x-b.x,cy=c.y-b.y;
  const dot=ax*cx+ay*cy;
  const mag=Math.sqrt(ax*ax+ay*ay)*Math.sqrt(cx*cx+cy*cy);
  return mag===0?0:Math.round(Math.acos(Math.min(1,Math.max(-1,dot/mag)))*180/Math.PI);
}
function vis(lm,...idxs){return idxs.every(i=>lm[i]&&(lm[i].visibility||0)>0.4);}

/* ================================================================
   ANALYZERS
   ================================================================ */
function analyzePullup(lm,conf){
  if(!vis(lm,12,14,16,24))return null;
  const elbow=ang(lm[12],lm[14],lm[16]);
  const body=ang(lm[12],lm[24],lm[28]);
  const isUp=elbow<100&&lm[0].y>lm[12].y-0.05; // nose above shoulders
  const isDown=elbow>155;
  const straight=body>155;
  const fb=[];
  if(!straight)fb.push({t:'warn',m:'גוף לא ישר — לא לנדנד'});
  if(isUp)fb.push({t:'good',m:'מצויין — סנטר מעל המוט'});
  if(isDown&&straight)fb.push({t:'good',m:'ירידה מבוקרת'});
  return{elbow,hip:body,phase:isUp?'למעלה':isDown?'תלייה':'בתנועה',isUp,isDown,form:straight?88:58,fb};
}
function analyzePushup(lm,conf){
  if(!vis(lm,12,14,16,24,28))return null;
  const elbow=ang(lm[12],lm[14],lm[16]);
  const body=ang(lm[12],lm[24],lm[28]);
  const sag=Math.abs(body-180);
  const isUp=elbow>155; const isDown=elbow<100;
  const plank=sag<22;
  const fb=[];
  if(!plank)fb.push({t:'bad',m:'הירכיים שוקעות — גוף ישר כקרש'});
  else fb.push({t:'good',m:'פלאנק מושלם'});
  if(isDown)fb.push({t:'good',m:'טווח מלא'});
  return{elbow,hip:body,phase:isUp?'למעלה':isDown?'למטה':'בתנועה',isUp,isDown,form:plank?86:52,fb};
}
function analyzePikePushup(lm,conf){
  if(!vis(lm,12,14,16,24))return null;
  const elbow=ang(lm[12],lm[14],lm[16]);
  const hip=ang(lm[12],lm[24],lm[28]);
  const pikeOk=hip<100; // hips high
  const isUp=elbow>150; const isDown=elbow<90;
  const fb=[];
  if(!pikeOk)fb.push({t:'warn',m:'הרם את הישבן — V כלפי מעלה'});
  else fb.push({t:'good',m:'זווית Pike מצויינת'});
  return{elbow,hip,phase:isUp?'למעלה':isDown?'למטה':'בתנועה',isUp,isDown,form:pikeOk?82:55,fb};
}
function analyzeHSPU(lm,conf){
  if(!vis(lm,15,16,12,14))return null;
  // In HSPU: feet (27/28) are above head; wrists (15/16) on ground
  const wristY=Math.max(lm[15].y,lm[16].y);
  const feetY=Math.min(lm[27].y,lm[28].y);
  const inverted=feetY<lm[12].y;
  const elbow=ang(lm[12],lm[14],lm[16]);
  const isUp=elbow>155; const isDown=elbow<90;
  const fb=[];
  if(!inverted)fb.push({t:'info',m:'עמוד על הידיים ← מחכה'});
  else if(isDown)fb.push({t:'good',m:'ירידה מבוקרת'});
  else if(isUp)fb.push({t:'good',m:'דחיפה מלאה'});
  return{elbow,hip:0,phase:!inverted?'ממתין':isUp?'למעלה':isDown?'למטה':'בתנועה',isUp:inverted&&isUp,isDown:inverted&&isDown,form:inverted?80:30,fb};
}
function analyzeDip(lm,conf){
  if(!vis(lm,12,14,16))return null;
  const elbow=ang(lm[12],lm[14],lm[16]);
  const shldr=ang(lm[14],lm[12],lm[24]);
  const isUp=elbow>160; const isDown=elbow<100;
  const fb=[];
  if(shldr>55)fb.push({t:'warn',m:'אל תשפיל יותר מדי — סיכון לכתפיים'});
  if(isDown)fb.push({t:'good',m:'עומק מצויין'});
  return{elbow,hip:shldr,phase:isUp?'למעלה':isDown?'למטה':'בתנועה',isUp,isDown,form:isDown&&shldr<55?88:65,fb};
}
function analyzeHandstand(lm,conf){
  if(conf<0.5)return null;
  const feetY=Math.min(lm[27]?.y||1,lm[28]?.y||1);
  const shoulderY=(lm[11].y+lm[12].y)/2;
  const inverted=feetY<shoulderY-0.1;
  const feetX=(lm[27].x+lm[28].x)/2;
  const wristX=(lm[15].x+lm[16].x)/2;
  const aligned=Math.abs(feetX-wristX)<0.1;
  const fb=[];
  if(!inverted)fb.push({t:'info',m:'עמוד על הידיים ← ממתין'});
  else if(!aligned)fb.push({t:'warn',m:'יישר — כפות רגליים מעל ידיים'});
  else fb.push({t:'good',m:'עמידת ידיים מיושרת! ✓'});
  return{elbow:0,hip:0,phase:!inverted?'ממתין':aligned?'מיושר ✓':'לא מיושר',isUp:false,isDown:false,form:inverted&&aligned?92:inverted?62:20,fb};
}
function analyzeLSit(lm,conf){
  if(!vis(lm,12,24,26,14,16))return null;
  const hipA=ang(lm[12],lm[24],lm[26]);
  const kneeA=ang(lm[24],lm[26],lm[28]);
  const elbowA=ang(lm[12],lm[14],lm[16]);
  const hipsUp=hipA<100;
  const legsStr=kneeA>155;
  const armsLock=elbowA>155;
  const fb=[];
  if(!hipsUp)fb.push({t:'warn',m:`הרם את הרגליים — ירך: ${hipA}°`});
  if(hipsUp&&!legsStr)fb.push({t:'warn',m:'ישר את הברכיים'});
  if(hipsUp&&legsStr&&armsLock)fb.push({t:'good',m:'L-Sit מושלם!'});
  return{elbow:elbowA,hip:hipA,phase:hipsUp&&armsLock?'L-SIT ✓':'עבודה...',isUp:false,isDown:false,form:hipsUp&&legsStr&&armsLock?92:hipsUp?68:40,fb};
}
function analyzePlancheLean(lm,conf){
  if(!vis(lm,12,16,24))return null;
  const leanAngle=ang(lm[16],lm[12],lm[24]);
  const bodyA=ang(lm[12],lm[24],lm[28]);
  const leanOk=leanAngle<65;
  const bodyStr=bodyA>165;
  const fb=[];
  if(!leanOk)fb.push({t:'warn',m:'הטה יותר קדימה — כתפיים לפני ידיים'});
  else fb.push({t:'good',m:'הטיה מצויינת'});
  if(!bodyStr)fb.push({t:'bad',m:'גוף לא ישר'});
  return{elbow:leanAngle,hip:bodyA,phase:leanOk&&bodyStr?'פוזיציה ✓':'מתכוונן',isUp:false,isDown:false,form:leanOk&&bodyStr?88:55,fb};
}
function analyzeFrontLever(lm,conf){
  if(!vis(lm,12,24,27))return null;
  const hipA=ang(lm[12],lm[24],lm[27]);
  const bodyHoriz=Math.abs(lm[12].y-lm[27].y)<0.08;
  const fb=[];
  if(!bodyHoriz)fb.push({t:'warn',m:'הגוף לא אופקי — הרם את הישבן והרגליים'});
  else fb.push({t:'good',m:'גוף אופקי — Front Lever ✓'});
  return{elbow:0,hip:hipA,phase:bodyHoriz?'אופקי ✓':'מתכוונן',isUp:false,isDown:false,form:bodyHoriz?85:45,fb};
}
function analyzeSquat(lm,conf){
  if(!vis(lm,24,26,28))return null;
  const kneeA=ang(lm[24],lm[26],lm[28]);
  const hipA=ang(lm[12],lm[24],lm[26]);
  const isUp=kneeA>160; const isDown=kneeA<100;
  const fb=[];
  if(isDown&&hipA>80)fb.push({t:'warn',m:'גב נוטה קדימה — שמור על עמוד שדרה ניטרלי'});
  if(isDown&&kneeA<90)fb.push({t:'good',m:'עומק מתחת למקבילה ✓'});
  if(isUp)fb.push({t:'good',m:'עמידה מלאה'});
  return{elbow:kneeA,hip:hipA,phase:isUp?'למעלה':isDown?'עמוק':'בתנועה',isUp,isDown,form:isDown&&hipA<75?88:65,fb};
}

/* ================================================================
   STATE
   ================================================================ */
let currentCat=null, currentVariant=null, currentEx=null;
let cameraRunning=false, videoFileMode=false;
let repCount=0, holdSec=0, holdStart=null, lastPhase=null;
let formHistory=[], allFeedback=[];
let pose=null, cameraObj=null, lmBuf=[], fileTimer=null;
let analysisFrames=0;
let goodStreak=0;        // consecutive frames with form>=80
let videoLoopCount=0;   // how many times the video looped
let verdictShown=false; // don't auto-show twice
const PASS_FORM=80;     // threshold %
const PASS_FRAMES=25;   // need 25 consecutive good frames (~2s at 12fps)

/* ================================================================
   MEDIAPIPE
   ================================================================ */
async function initPose(){
  document.getElementById('loadingOv').style.display='flex';
  document.getElementById('loadingMsg').textContent='טוען מודל AI...';
  try{
    pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({modelComplexity:1,smoothLandmarks:true,enableSegmentation:false,
      minDetectionConfidence:0.65,minTrackingConfidence:0.55});
    pose.onResults(onPoseResults);
    document.getElementById('loadingMsg').textContent='מוכן ✓';
    await new Promise(r=>setTimeout(r,500));
  }catch(e){addFb('bad','שגיאת טעינה: '+e.message);}
  document.getElementById('loadingOv').style.display='none';
}

/* ================================================================
   SMOOTH LANDMARKS
   ================================================================ */
function smoothLm(lm){
  lmBuf.push(lm); if(lmBuf.length>4)lmBuf.shift();
  if(lmBuf.length<2)return lm;
  return lm.map((_,i)=>({
    x:lmBuf.reduce((s,f)=>s+f[i].x,0)/lmBuf.length,
    y:lmBuf.reduce((s,f)=>s+f[i].y,0)/lmBuf.length,
    z:lmBuf.reduce((s,f)=>s+f[i].z,0)/lmBuf.length,
    visibility:lm[i].visibility,
  }));
}

/* ================================================================
   POSE RESULTS — draw ONLY inside #mediaBox
   ================================================================ */
function onPoseResults(results){
  const canvas=document.getElementById('outputCanvas');
  const ctx=canvas.getContext('2d');

  // Size canvas to match the source image exactly
  if(canvas.width!==results.image.width||canvas.height!==results.image.height){
    canvas.width=results.image.width;
    canvas.height=results.image.height;
    // Resize mediaBox to match AR
    sizeMediaBox(results.image.width,results.image.height);
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Draw the video frame onto canvas (so skeleton overlays on top)
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

  if(!results.poseLandmarks||!currentEx){
    setStatus('לא זוהה אדם...');return;
  }

  const lm=smoothLm(results.poseLandmarks);
  const conf=lm.reduce((s,p)=>s+(p.visibility||0),0)/lm.length;
  document.getElementById('mConf').textContent=Math.round(conf*100)+'%';

  // Draw skeleton — custom colors
  drawConnectors(ctx,lm,POSE_CONNECTIONS,{color:'rgba(0,168,255,.5)',lineWidth:3});
  // Key joints highlighted
  [12,14,16,11,13,15,24,26,28,23,25,27].forEach(i=>{
    if(!lm[i]||lm[i].visibility<0.4)return;
    ctx.beginPath();
    ctx.arc(lm[i].x*canvas.width,lm[i].y*canvas.height,6,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,213,.9)';ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Analyze
  const result=currentEx.analyze(lm,conf);
  if(!result){setStatus('מנסה לזהות...');return;}
  analysisFrames++;

  // Update metrics
  document.getElementById('mElbow').textContent=result.elbow+'°';
  document.getElementById('mHip').textContent=result.hip?Math.round(result.hip)+'°':'—°';
  document.getElementById('mBody').textContent=result.form>=75?'✓ טוב':'⚠ שיפור';
  document.getElementById('mPhase').textContent=result.phase;

  // Form score
  const fs=result.form||0;
  formHistory.push(fs);if(formHistory.length>120)formHistory.shift();
  const fsEl=document.getElementById('formScore');
  fsEl.textContent=fs;
  fsEl.style.color=fs>=80?'var(--success)':fs>=60?'var(--gold)':'var(--danger)';

  // Good-frame streak → auto-verdict at 80%+
  if(!verdictShown){
    if(fs>=PASS_FORM){
      goodStreak++;
      const pct=Math.min(100,Math.round(goodStreak/PASS_FRAMES*100));
      setStatus(`🔥 צורה מצויינת — ${pct}% לעבור`);
      updateProgressBar(pct);
      if(goodStreak>=PASS_FRAMES){
        triggerAutoVerdict(true);
        return;
      }
    }else{
      if(goodStreak>0)goodStreak=Math.max(0,goodStreak-3); // decay slowly
      updateProgressBar(Math.round(goodStreak/PASS_FRAMES*100));
    }
  }

  // Rep / hold counting
  const ex=currentEx;
  if(ex.holdSec){
    if(fs>=50){
      if(!holdStart)holdStart=Date.now();
      holdSec=Math.floor((Date.now()-holdStart)/1000);
      document.getElementById('repCount').textContent=holdSec+'s';
      if(!verdictShown)setStatus(`החזקה ${holdSec}/${ex.holdSec}s`);
      if(holdSec>=ex.holdSec&&!verdictShown){triggerAutoVerdict(true);}
    }else{holdStart=null;holdSec=0;if(!verdictShown)setStatus('שפר פוזיציה להתחלת ספירה');}
  }else{
    if(result.isUp&&lastPhase==='down'){
      repCount++;
      const el=document.getElementById('repCount');
      el.textContent=repCount;
      el.style.color='var(--success)';setTimeout(()=>el.style.color='var(--cyan)',250);
    }
    lastPhase=result.isUp?'up':result.isDown?'down':lastPhase;
    if(!verdictShown&&goodStreak<PASS_FRAMES)setStatus(result.phase);
  }

  // Angle labels on canvas
  drawAngLabel(ctx,lm[14],result.elbow+'°','#00ffd5',canvas);
  if(result.hip)drawAngLabel(ctx,lm[24],Math.round(result.hip)+'°','#ffc14d',canvas);

  // Throttled feedback
  if(result.fb?.length&&analysisFrames%15===0){
    result.fb.forEach(f=>{
      if(!allFeedback.find(af=>af.m===f.m&&Date.now()-af.t<4000)){
        allFeedback.push({...f,t:Date.now()});
        addFb(f.t,f.m);
      }
    });
  }
}

/* ── Auto verdict ── */
function triggerAutoVerdict(pass){
  if(verdictShown)return;
  verdictShown=true;
  updateProgressBar(pass?100:0);
  // stop video/camera
  const vid=document.getElementById('videoFile');
  if(vid&&!vid.paused)vid.pause();
  if(fileTimer){clearInterval(fileTimer);fileTimer=null;}
  setStatus(pass?'✅ עובר! מציג תוצאה...':'❌ לא הגעת ל-80% — מציג תוצאה...');
  setTimeout(()=>showVerdict(pass),700);
}

/* ── Progress bar toward 80% ── */
function updateProgressBar(pct){
  let bar=document.getElementById('formProgressBar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='formProgressBar';
    bar.style.cssText='position:absolute;bottom:0;left:0;height:3px;background:var(--cyan);transition:width .3s ease;z-index:6;border-radius:0 2px 2px 0';
    document.getElementById('mediaBox').appendChild(bar);
  }
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'var(--success)':pct>=60?'var(--gold)':'var(--cyan)';
}

function drawAngLabel(ctx,lm,txt,color,canvas){
  if(!lm||lm.visibility<0.4)return;
  const x=lm.x*canvas.width+8,y=lm.y*canvas.height-8;
  ctx.font='bold 14px Share Tech Mono';
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillRect(x-2,y-14,ctx.measureText(txt).width+6,18);
  ctx.fillStyle=color;
  ctx.fillText(txt,x+1,y);
}

/* ================================================================
   SIZE MEDIA BOX — keeps video AR, no canvas overflow
   ================================================================ */
function sizeMediaBox(w,h){
  const wrap=document.getElementById('camWrap');
  const box=document.getElementById('mediaBox');
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  const ar=w/h;
  let bw=ww,bh=wh;
  if(ww/wh>ar){bw=wh*ar;}else{bh=ww/ar;}
  box.style.width=bw+'px';
  box.style.height=bh+'px';
  document.getElementById('outputCanvas').style.width=bw+'px';
  document.getElementById('outputCanvas').style.height=bh+'px';
}
window.addEventListener('resize',()=>{
  const c=document.getElementById('outputCanvas');
  if(c.width&&c.height)sizeMediaBox(c.width,c.height);
});

/* ================================================================
   CAMERA / FILE
   ================================================================ */
function toggleSource(){
  if(cameraRunning||videoFileMode){stopAll();return;}
  if(!currentEx){addFb('warn','בחר תרגיל קודם');return;}
  document.getElementById('fileInput').click();
}
async function startLive(){
  if(!currentEx){addFb('warn','בחר תרגיל קודם');return;}
  if(!pose)await initPose();
  stopAll();
  document.getElementById('loadingOv').style.display='flex';
  document.getElementById('loadingMsg').textContent='מפעיל מצלמה...';
  try{
    const vid=document.getElementById('inputVideo');
    vid.style.display='block';
    cameraObj=new Camera(vid,{
      onFrame:async()=>{if(pose&&cameraRunning)await pose.send({image:vid});},
      width:1280,height:720});
    await cameraObj.start();
    cameraRunning=true;
    document.getElementById('camPlaceholder').style.display='none';
    document.getElementById('repOverlay').style.display='block';
    document.getElementById('formOverlay').style.display='block';
    document.getElementById('startBtn').textContent='⏹ עצור';
    document.getElementById('startBtn').classList.add('stop');
    setStatus('מצלמה פעילה...');
    await new Promise(r=>setTimeout(r,400));
  }catch(e){addFb('bad','שגיאת מצלמה: '+e.message);}
  document.getElementById('loadingOv').style.display='none';
}
async function handleFileSelect(file){
  if(!file||!file.type.startsWith('video/'))return;
  if(!currentEx){addFb('warn','בחר תרגיל קודם');return;}
  if(!pose)await initPose();
  stopAll();
  videoFileMode=true;
  const vid=document.getElementById('videoFile');
  vid.src=URL.createObjectURL(file);
  vid.style.display='block';
  document.getElementById('camPlaceholder').style.display='none';
  document.getElementById('repOverlay').style.display='block';
  document.getElementById('formOverlay').style.display='block';
  document.getElementById('startBtn').textContent='⏹ עצור';
  document.getElementById('startBtn').classList.add('stop');
  addFb('info','🎬 '+file.name);
  vid.loop=false; // we control looping manually
  vid.onended=()=>{
    if(verdictShown)return;
    videoLoopCount++;
    const avgForm=formHistory.length?Math.round(formHistory.reduce((a,b)=>a+b)/formHistory.length):0;
    if(videoLoopCount>=2||avgForm>=PASS_FORM){
      triggerAutoVerdict(avgForm>=PASS_FORM);
    }else{
      addFb('info',`סיבוב ${videoLoopCount}/2 — ממוצע צורה: ${avgForm}% — מנגן שוב...`);
      vid.currentTime=0;
      vid.play();
    }
  };
  vid.onloadeddata=()=>{
    vid.play();
    fileTimer=setInterval(async()=>{
      if(!videoFileMode||vid.paused||vid.ended)return;
      if(pose)await pose.send({image:vid});
    },80);
  };
}
function stopAll(){
  if(cameraObj){cameraObj.stop();cameraObj=null;}
  if(fileTimer){clearInterval(fileTimer);fileTimer=null;}
  cameraRunning=false;videoFileMode=false;lmBuf=[];
  const vf=document.getElementById('videoFile');
  vf.pause();vf.src='';vf.style.display='none';
  document.getElementById('inputVideo').style.display='none';
  document.getElementById('camPlaceholder').style.display='flex';
  document.getElementById('repOverlay').style.display='none';
  document.getElementById('formOverlay').style.display='none';
  document.getElementById('startBtn').textContent='▶ התחל';
  document.getElementById('startBtn').classList.remove('stop');
  const ctx=document.getElementById('outputCanvas').getContext('2d');
  ctx.clearRect(0,0,99999,99999);
  setStatus('ממתין...');
}

/* ================================================================
   DRAG & DROP
   ================================================================ */
const cw=document.getElementById('camWrap');
cw.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dragFlash').classList.add('on');});
cw.addEventListener('dragleave',e=>{if(!cw.contains(e.relatedTarget))document.getElementById('dragFlash').classList.remove('on');});
cw.addEventListener('drop',e=>{
  e.preventDefault();document.getElementById('dragFlash').classList.remove('on');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('video/'))handleFileSelect(f);
  else addFb('bad','גרור קובץ וידאו בלבד');
});

/* ================================================================
   EXERCISE SELECTOR — two-level
   ================================================================ */
function buildCatGrid(){
  const g=document.getElementById('catGrid');
  g.innerHTML=Object.entries(CATS).map(([id,c])=>
    `<button class="cat-btn" data-cat="${id}" onclick="selectCat('${id}')">
      <span class="ci">${c.icon}</span>
      <span class="cn">${c.name}</span>
    </button>`
  ).join('');
}
function selectCat(id){
  currentCat=id;currentVariant=null;currentEx=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===id));
  const cat=CATS[id];
  const varSec=document.getElementById('variantSec');
  const varList=document.getElementById('variantList');
  varSec.style.display='block';
  varList.innerHTML=Object.entries(cat.variants).map(([vid,v])=>
    `<button class="var-btn" data-var="${vid}" onclick="selectVariant('${id}','${vid}')">
      <span class="vi">${cat.icon}</span>
      <div class="vn">${v.name}<div class="vd">${v.desc}</div></div>
    </button>`
  ).join('');
  document.getElementById('angleGuide').style.display='none';
  resetCounts();
}
function selectVariant(catId,varId){
  currentCat=catId;currentVariant=varId;
  currentEx=CATS[catId].variants[varId];
  document.querySelectorAll('.var-btn').forEach(b=>b.classList.toggle('active',b.dataset.var===varId));
  document.getElementById('angleGuide').style.display='block';
  document.getElementById('angleText').textContent=currentEx.angle;
  resetCounts();
  addFb('info',`✓ נבחר: ${currentEx.name}`);
  const g=currentEx.holdSec?`מטרה: ${currentEx.holdSec}s החזקה`:`מטרה: ${currentEx.minReps} חזרות`;
  addFb('info',g);
}
function resetCounts(){
  repCount=0;holdSec=0;holdStart=null;lastPhase=null;
  formHistory=[];allFeedback=[];analysisFrames=0;
  goodStreak=0;videoLoopCount=0;verdictShown=false;
  document.getElementById('repCount').textContent='0';
  document.getElementById('repLabel').textContent=currentEx?.holdSec?'שניות':'חזרות';
  document.getElementById('verdictBtn').disabled=true;
  updateProgressBar(0);
  clearFb();
}

/* ================================================================
   FEEDBACK
   ================================================================ */
function addFb(type,msg){
  const list=document.getElementById('feedbackList');
  const d=document.createElement('div');
  d.className='fb-item '+type;d.textContent=msg;
  list.insertBefore(d,list.firstChild);
  while(list.children.length>10)list.removeChild(list.lastChild);
}
function clearFb(){document.getElementById('feedbackList').innerHTML='';}
function setStatus(t){document.getElementById('statusBar').textContent=t;}

/* ================================================================
   VERDICT
   ================================================================ */
function showVerdict(autoPass){
  const ex=currentEx;
  const avgForm=formHistory.length?Math.round(formHistory.reduce((a,b)=>a+b)/formHistory.length):0;
  const c=ex.criteria||{};
  const repsOk=ex.holdSec?holdSec>=ex.holdSec:repCount>=(ex.minReps||1);
  const formOk=avgForm>=PASS_FORM;
  const pass=autoPass!==undefined?autoPass:(formOk&&repsOk);
  const token=`KALOS-${currentVariant?.slice(0,4).toUpperCase()}-${Date.now().toString(36).slice(-4).toUpperCase()}`;

  // Save
  const v={ex:currentVariant,name:ex.name,reps:repCount,hold:holdSec,avgForm,pass,token,ts:Date.now()};
  const saved=JSON.parse(localStorage.getItem('kalos_verifications')||'[]');
  saved.push(v);localStorage.setItem('kalos_verifications',JSON.stringify(saved.slice(-50)));

  const card=document.getElementById('verdictCard');
  card.innerHTML=`
    <div class="verdict-big">${pass?'🏆':'💪'}</div>
    <div class="verdict-title" style="color:${pass?'var(--success)':'var(--gold)'}">
      ${pass?'הצלחת!':'המשך לאמן'}
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${ex.name}</div>
    <div class="verdict-stats">
      <div class="verdict-row"><span class="vk">${ex.holdSec?'זמן החזקה':'חזרות'}</span>
        <span class="vv" style="color:var(--cyan)">${ex.holdSec?holdSec+'s':repCount}</span></div>
      <div class="verdict-row"><span class="vk">ציון צורה ממוצע</span>
        <span class="vv" style="color:${avgForm>=75?'var(--success)':avgForm>=55?'var(--gold)':'var(--danger)'}">${avgForm}/100</span></div>
      <div class="verdict-row"><span class="vk">קריטריון עבר</span>
        <span class="vv" style="color:${repsOk?'var(--success)':'var(--danger)'}">${repsOk?'✓':'✗'} ${ex.holdSec?`${c.hold||ex.holdSec}s`:c.reps||ex.minReps+' חזרות'}</span></div>
      <div class="verdict-row"><span class="vk">קריטריון צורה</span>
        <span class="vv" style="color:${formOk?'var(--success)':'var(--danger)'}">${formOk?'✓':'✗'} מינימום ${c.form||60}</span></div>
    </div>
    ${pass?`<div style="background:rgba(0,255,170,.06);border:1px solid rgba(0,255,170,.2);border-radius:7px;padding:10px;margin-bottom:14px;font-size:11px">
      <div style="color:var(--muted);font-size:9px;letter-spacing:.1em;margin-bottom:5px">קוד אימות</div>
      <div style="font-family:'Orbitron',monospace;color:var(--success);letter-spacing:.12em" id="vToken">${token}</div>
    </div>`:''}
    <div class="verdict-btns">
      ${pass?`<button onclick="navigator.clipboard?.writeText('${token}');addFb('good','קוד הועתק')" style="flex:1;background:rgba(0,255,170,.12);border:1px solid rgba(0,255,170,.35);color:var(--success);font-family:'Share Tech Mono',monospace;font-size:11px;padding:9px;border-radius:5px;cursor:pointer">📋 העתק קוד</button>`:''}
      <button onclick="document.getElementById('verdictModal').classList.remove('show')" style="flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;padding:9px;border-radius:5px;cursor:pointer">סגור</button>
    </div>`;
  document.getElementById('verdictModal').classList.add('show');
}

/* ================================================================
   INIT
   ================================================================ */
buildCatGrid();
</script>
